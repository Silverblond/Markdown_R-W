<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Viewer</title>
    <!-- theme applied before render to avoid flash -->
    <script>
      const t = localStorage.getItem('theme') ||
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    </script>
    <link rel="stylesheet" href="/vendor/github.min.css" id="hljs-light" />
    <link rel="stylesheet" href="/vendor/github-dark.min.css" id="hljs-dark" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/vendor/katex.min.css" />
    <script src="/vendor/marked.umd.js"></script>
    <script src="/vendor/highlight.min.js"></script>
    <script src="/vendor/katex.min.js"></script>
  </head>
  <body>
    <!-- File changed notification bar -->
    <div id="file-changed-bar" class="file-changed-bar hidden">
      <span>파일이 외부에서 변경되었습니다.</span>
      <button id="btn-reload">다시 로드</button>
      <button id="btn-dismiss-change" class="icon-btn-sm">✕</button>
    </div>

    <header class="toolbar" id="toolbar">
      <button id="btn-sidebar-toggle" class="icon-btn" title="사이드바 (Ctrl/Cmd+B)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="2" width="14" height="1.5" rx="0.75"/>
          <rect x="1" y="7.25" width="14" height="1.5" rx="0.75"/>
          <rect x="1" y="12.5" width="14" height="1.5" rx="0.75"/>
        </svg>
      </button>

      <div class="toolbar-sep"></div>

      <button id="btn-save" title="저장 (Ctrl/Cmd+S)" disabled>저장</button>
      <button id="btn-insert-image" class="icon-btn" title="이미지 삽입 (편집 모드)" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
          <path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z"/>
        </svg>
      </button>

      <div class="modes" role="tablist">
        <button id="mode-preview" class="active" data-mode="preview">미리보기</button>
        <button id="mode-source" data-mode="source">원본</button>
        <button id="mode-edit" data-mode="edit">편집</button>
      </div>

      <div class="toolbar-right">
        <span id="filename" class="filename">—</span>

        <button id="btn-search" class="icon-btn" title="검색 (Ctrl/Cmd+F)">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
          </svg>
        </button>

        <button id="btn-print" class="icon-btn" title="인쇄 / PDF">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
            <path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/>
            <path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2H5zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4V3zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2H5zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1z"/>
          </svg>
        </button>

        <button id="btn-focus" class="icon-btn" title="포커스 모드 (Ctrl/Cmd+Shift+F)">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
            <path d="M1.5 1h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 1-.5-.5V1zm0 3h4a.5.5 0 0 1 0 1H2v3a.5.5 0 0 1-1 0V4.5a.5.5 0 0 1 .5-.5zM10 1h4a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V2h-3.5a.5.5 0 0 1 0-1zM14.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-.5.5H11a.5.5 0 0 1 0-1h3v-3.5a.5.5 0 0 1 .5-.5zM1.5 10a.5.5 0 0 1 .5.5V14h3.5a.5.5 0 0 1 0 1H1a.5.5 0 0 1-.5-.5v-4a.5.5 0 0 1 .5-.5z"/>
          </svg>
        </button>

        <div class="settings-wrap">
          <button id="btn-settings" class="icon-btn" title="설정">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
              <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.433-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.892-1.64-.901-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.474l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
            </svg>
          </button>
          <!-- Settings popover -->
          <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-row">
              <label>폰트</label>
              <select id="setting-font">
                <option value="system">시스템 기본</option>
                <option value="serif">Serif</option>
                <option value="mono">Monospace</option>
                <option value="georgia">Georgia</option>
              </select>
            </div>
            <div class="settings-row">
              <label>글자 크기</label>
              <div class="settings-size-row">
                <button id="btn-font-dec">−</button>
                <span id="font-size-val">16</span>px
                <button id="btn-font-inc">+</button>
              </div>
            </div>
            <div class="settings-row settings-row-toggle">
              <label>줄바꿈 (편집)</label>
              <label class="toggle-switch">
                <input type="checkbox" id="setting-wrap" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>

        <button id="btn-theme" class="icon-btn" title="테마 전환">
          <svg id="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
          </svg>
          <svg id="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none">
            <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Tab bar -->
    <div id="tab-bar" class="tab-bar"></div>

    <!-- Search bar -->
    <div id="search-bar" class="search-bar hidden">
      <input id="search-input" type="text" placeholder="검색..." autocomplete="off" />
      <span id="search-count" class="search-count"></span>
      <button id="btn-search-prev" title="이전 (Shift+Enter)">↑</button>
      <button id="btn-search-next" title="다음 (Enter)">↓</button>
      <button id="btn-search-close" title="닫기 (Esc)">✕</button>
    </div>

    <div class="workspace">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <button id="btn-open" title="파일 열기 (Ctrl/Cmd+O)">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
              <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
            </svg>
            파일
          </button>
          <button id="btn-open-dir">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path d="M.54 3.87.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.826a2 2 0 0 1-1.991-1.819l-.637-7a2 2 0 0 1 .342-1.31z"/>
            </svg>
            폴더
          </button>
        </div>

        <!-- Sidebar tabs -->
        <div class="sidebar-tabs">
          <button class="sidebar-tab active" data-tab="files">파일</button>
          <button class="sidebar-tab" data-tab="toc">목차</button>
        </div>

        <div id="sidebar-panel-files" class="sidebar-panel">
          <div class="sidebar-tree" id="sidebar-tree">
            <p class="tree-hint">파일이나 폴더를 열어주세요</p>
          </div>
        </div>

        <div id="sidebar-panel-toc" class="sidebar-panel hidden">
          <div class="sidebar-tree" id="toc-list">
            <p class="tree-hint">문서를 열면 목차가 표시됩니다</p>
          </div>
        </div>
      </aside>

      <main id="content">
        <article id="view-preview" class="pane markdown-body hidden"></article>
        <pre id="view-source" class="pane hidden"><code class="language-markdown"></code></pre>
        <div id="view-edit" class="pane split hidden">
          <textarea id="editor" spellcheck="false" placeholder="여기에 마크다운을 입력하세요..."></textarea>
          <div id="split-resizer" class="split-resizer"></div>
          <article id="edit-preview" class="markdown-body"></article>
        </div>

        <!-- Welcome / empty state -->
        <div id="welcome" class="welcome">
          <div class="welcome-card">
            <div class="welcome-logo">M↓</div>
            <h1 class="welcome-title">Markdown Viewer</h1>
            <p class="welcome-sub">마크다운을 아름답게 읽고 편집하세요</p>
            <div class="welcome-actions">
              <button id="btn-welcome-file" class="welcome-btn primary">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zm-3 0A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4.5h-2z"/>
                </svg>
                <span>파일 열기</span>
                <kbd>⌘O</kbd>
              </button>
              <button id="btn-welcome-dir" class="welcome-btn">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M.54 3.87.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.826a2 2 0 0 1-1.991-1.819l-.637-7a2 2 0 0 1 .342-1.31z"/>
                </svg>
                <span>폴더 열기</span>
              </button>
            </div>
            <div id="recent-section" class="recent-section hidden">
              <p class="recent-title">최근 파일</p>
              <ul id="recent-list" class="recent-list"></ul>
            </div>
          </div>
        </div>
      </main>
    </div>

    <button id="btn-scroll-top" class="scroll-top hidden" title="최상단으로">↑</button>

    <footer class="statusbar" id="statusbar">
      <span id="status-left"></span>
      <span id="status-right"></span>
    </footer>

    <!-- Lightbox overlay -->
    <div id="lightbox" role="dialog" aria-modal="true" aria-label="이미지 확대">
      <button id="lightbox-close" title="닫기 (Esc)">✕</button>
      <figure style="margin:0;display:flex;flex-direction:column;align-items:center">
        <img id="lightbox-img" src="" alt="" />
        <figcaption id="lightbox-caption"></figcaption>
      </figure>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
