<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Viewer</title>
    <!-- theme applied before render to avoid flash -->
    <script>
      const t = localStorage.getItem('theme') ||
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    </script>
    <link rel="stylesheet" href="/vendor/github.min.css" id="hljs-light" />
    <link rel="stylesheet" href="/vendor/github-dark.min.css" id="hljs-dark" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/vendor/marked.umd.js"></script>
    <script src="/vendor/highlight.min.js"></script>
  </head>
  <body>
    <header class="toolbar">
      <button id="btn-sidebar-toggle" class="icon-btn" title="사이드바 (Ctrl/Cmd+B)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="2" width="14" height="1.5" rx="0.75"/>
          <rect x="1" y="7.25" width="14" height="1.5" rx="0.75"/>
          <rect x="1" y="12.5" width="14" height="1.5" rx="0.75"/>
        </svg>
      </button>

      <div class="toolbar-sep"></div>

      <button id="btn-save" title="저장 (Ctrl/Cmd+S)" disabled>저장</button>

      <div class="modes" role="tablist">
        <button id="mode-preview" class="active" data-mode="preview">미리보기</button>
        <button id="mode-source" data-mode="source">원본</button>
        <button id="mode-edit" data-mode="edit">편집</button>
      </div>

      <div class="toolbar-right">
        <span id="filename" class="filename">—</span>
        <button id="btn-theme" class="icon-btn" title="테마 전환">
          <svg id="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
          </svg>
          <svg id="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none">
            <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <button id="btn-open" title="파일 열기 (Ctrl/Cmd+O)">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
              <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
            </svg>
            파일
          </button>
          <button id="btn-open-dir">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path d="M.54 3.87.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.826a2 2 0 0 1-1.991-1.819l-.637-7a2 2 0 0 1 .342-1.31z"/>
            </svg>
            폴더
          </button>
        </div>
        <div class="sidebar-tree" id="sidebar-tree">
          <p class="tree-hint">파일이나 폴더를 열어주세요</p>
        </div>
      </aside>

      <main id="content">
        <article id="view-preview" class="pane markdown-body hidden"></article>
        <pre id="view-source" class="pane hidden"><code class="language-markdown"></code></pre>
        <div id="view-edit" class="pane split hidden">
          <textarea id="editor" spellcheck="false" placeholder="여기에 마크다운을 입력하세요..."></textarea>
          <article id="edit-preview" class="markdown-body"></article>
        </div>

        <!-- Welcome / empty state -->
        <div id="welcome" class="welcome">
          <div class="welcome-card">
            <div class="welcome-logo">M↓</div>
            <h1 class="welcome-title">Markdown Viewer</h1>
            <p class="welcome-sub">마크다운을 아름답게 읽고 편집하세요</p>
            <div class="welcome-actions">
              <button id="btn-welcome-file" class="welcome-btn primary">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zm-3 0A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4.5h-2z"/>
                </svg>
                <span>파일 열기</span>
                <kbd>⌘O</kbd>
              </button>
              <button id="btn-welcome-dir" class="welcome-btn">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M.54 3.87.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.826a2 2 0 0 1-1.991-1.819l-.637-7a2 2 0 0 1 .342-1.31z"/>
                </svg>
                <span>폴더 열기</span>
              </button>
            </div>
            <div id="recent-section" class="recent-section hidden">
              <p class="recent-title">최근 파일</p>
              <ul id="recent-list" class="recent-list"></ul>
            </div>
          </div>
        </div>
      </main>
    </div>

    <button id="btn-scroll-top" class="scroll-top hidden" title="최상단으로">↑</button>

    <footer class="statusbar">
      <span id="status-left"></span>
      <span id="status-right"></span>
    </footer>

    <script src="/main.js"></script>
  </body>
</html>
